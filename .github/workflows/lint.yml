name: Quality Checks

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prettier check
        run: npm run format:check

      - name: ESLint
        run: npm run lint:js

      - name: Stylelint
        run: npm run lint:css

      - name: HTML validate
        run: npm run lint:html

      # Fails the build only on high/critical advisories. Moderate findings
      # surface in the log but do not block: stylelint's transitive deps
      # often contain moderate items that can't be patched directly.
      - name: npm audit (high+)
        run: npm audit --omit=dev --audit-level=high || npm audit --audit-level=high
